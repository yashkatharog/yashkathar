<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yash Kathar</title>

    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: #0f172a;
            color: white;
            text-align: center;
        }

        header {
            padding: 50px;
            background: #1e293b;
        }

        h1 {
            margin: 0;
            font-size: 40px;
        }

        p {
            font-size: 18px;
            color: #cbd5e1;
        }

        section {
            padding: 40px;
        }

        .btn {
            display: inline-block;
            padding: 10px 20px;
            background: #38bdf8;
            color: black;
            text-decoration: none;
            border-radius: 5px;
            margin: 10px;
        }

        .btn:hover {
            background: #0ea5e9;
        }

        /* 🔥 PROJECTS FLEX */
        .projects {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .card {
            background: #1e293b;
            padding: 20px;
            border-radius: 10px;
            width: 220px;
            transition: transform 0.2s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        /* 📱 MOBILE DESIGN */
        @media (max-width: 768px) {

            header {
                padding: 30px 20px;
            }

            h1 {
                font-size: 28px;
            }

            p {
                font-size: 16px;
            }

            section {
                padding: 20px;
            }

            .btn {
                display: block;
                width: 80%;
                margin: 10px auto;
            }

            .projects {
                flex-direction: column;
                align-items: center;
            }
        }
    </style>
</head>

<body>

<header>
    <h1>Hey, I'm Yash 🚀</h1>
    <p>Product Designer | Building cool stuff</p>

    <a href="mailto:your@email.com" class="btn">Contact Me</a>
    <a href="https://www.linkedin.com/in/yashkathar" class="btn" target="_blank">LinkedIn</a>
</header>

<section>
    <h2>About Me</h2>
    <p>I design product details and love creating digital things.</p>
</section>

<section>
    <h2>My Work</h2>

    <div class="projects">

        <div class="card">
            <h3>Project 1</h3>
            <p>Add your real project here</p>
        </div>

        <div class="card">
            <h3>Project 2</h3>
            <p>Add your real project here</p>
        </div>

        <div class="card">
            <h3>Project 3</h3>
            <p>Add your real project here</p>

    </div>
</section>

</body>
</html>
